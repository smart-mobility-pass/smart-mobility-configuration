# ===================================================================
# Global Default Configuration (Shared by all microservices)
# ===================================================================

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,tracing
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Tracing / Zipkin (Local Default)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans
